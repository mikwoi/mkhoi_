
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng kí hội thao</title>
</head>
<body>

<h2>Đăng kí tham gia Hội thao</h2>

<form>
    <label>Họ và tên:</label><br>
    <input type="text" name="hoten"><br><br>

    
    <label>Địa chỉ email:</label><br>
    <input type="email" name="email"><br><br>

  
    <label>Lớp:</label><br>
    <input type="radio" name="lop" value="10"> Lớp 10
    <input type="radio" name="lop" value="11"> Lớp 11
    <input type="radio" name="lop" value="12"> Lớp 12
    <br><br>

   
    <label>Tham dự môn:</label><br>
    <input type="checkbox" name="mon" value="bongban"> Bóng bàn<br>
    <input type="checkbox" name="mon" value="caulong"> Cầu lông<br>
    <input type="checkbox" name="mon" value="covua"> Cờ vua<br><br>

  
    <input type="submit" value="Đăng kí">
    <input type="reset" value="Hủy bỏ">
</form>

</body>
</html>
